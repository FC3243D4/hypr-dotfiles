# USER
label {
    monitor = $PRIMARY_DISPLAY
    text =   $USER
    color = $error
    font_size = 36
    font_family = JetBrainsMono Nerd Font
    position = 0, 275
    halign = center
    valign = bottom
}

# INPUT FIELD
input-field {
    monitor = $PRIMARY_DISPLAY
    size = 230, 70
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = $outline
    inner_color = rgba(255, 255, 255, 0.1)
	capslock_color = rgb(255,255,255)
    font_color = $tertiary_container
    fade_on_empty = false
    font_family = JetBrainsMono Nerd Font
    placeholder_text = <i><span foreground="##ffffff99">🔒 Type Password</span></i>
    hide_input = false
    position = 0, 100
    halign = center
    valign = bottom
}

# Keyboard LAYOUT
label {
    monitor = $PRIMARY_DISPLAY
    text = $LAYOUT
    color = $outline
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, 70
    halign = center
    valign = bottom
}

# uptime
label {
    monitor = $PRIMARY_DISPLAY
    text = cmd[update:60000] echo "<b> "$(uptime -p || $Scripts/UptimeNixOS.sh)" </b>"
    color = $outline
    font_size = 24
    font_family = JetBrainsMono Nerd Font
    position = 0, 0
    halign = right
    valign = bottom
}

# battery information
label {
    monitor = $PRIMARY_DISPLAY
    text = cmd[update:1000] echo "<b> "$($Scripts/Battery.sh)" </b>"
    color = $outline
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, 30
    halign = right
    valign = bottom
}

# weather edit the scripts for locations
# weather scripts are located in ~/.config/hypr/UserScripts Weather.sh and/or Weather.py
# see https://github.com/JaKooLit/Hyprland-Dots/wiki/TIPS#%EF%B8%8F-weather-app-related-for-waybar-and-hyprlock
label {
    monitor = $PRIMARY_DISPLAY
    text = cmd[update:3600000] [ -f "$HOME/.cache/.weather_cache" ] && cat "$HOME/.cache/.weather_cache"
    color = $outline
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 50, 0
    halign = left
    valign = bottom
}