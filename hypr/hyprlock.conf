# Hyprlock config for < 1080p monitor resolutions                                                         
# Original config submitted by https://github.com/SherLock707

# Sourcing colors generated by matugen (InioX/matugen-themes)
source = $HOME/.config/hypr/matugen/colors-hyprland.conf
$Scripts = $HOME/.config/hypr/scripts

general {
    grace = 1
    fractional_scaling = 2
    immediate_render = true
}

background {
    monitor =
    # NOTE: use only 1 path
	#path = screenshot   # screenshot of your desktop
	#path = $HOME/.config/hypr/wallpaper_effects/.wallpaper_modified # by wallpaper effects
    # path = $HOME/.config/hypr/wallpaper_effects/.wallpaper_current # current wallpaper
    path = $HOME/.config/WallpaperChanger/.current_wallpaper
    color = rgb(0,0,0) # color will be rendered initially until path is available

    # all these options are taken from hyprland, see https://wiki.hyprland.org/Configuring/Variables/#blur for explanations
    blur_size = 3
    blur_passes = 2 # 0 disables blurring
    noise = 0.0117
    contrast = 1.3000 # Vibrant!!!
    brightness = 0.8000
    vibrancy = 0.2100
    vibrancy_darkness = 0.0
}


# Date
label {
    monitor = $PRIMARY_DISPLAY
    text = cmd[update:18000000] echo "<b> "$(date +'%A, %-d %B')" </b>"
    color = $tertiary_container
    font_size = 48 
    font_family = JetBrainsMono Nerd Font
    position = 0, -60
    halign = center
    valign = center
}

# Hour-Time
label {
    monitor = $PRIMARY_DISPLAY
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    #text = cmd[update:1000] echo "$(date +"%I:%M %p")" #AM/PM
	#color = rgba(255, 185, 0, .8)
    color = $outline
    font_size = 130
    font_family = JetBrainsMono Nerd Font ExtraBold 
    position = 0, -250
    halign = center
    valign = top
}

